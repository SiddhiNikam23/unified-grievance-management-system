<!DOCTYPE html> 
<html> 
<head> 
    <title>NagrikConnect Database Viewer</title> 
    <style> 
        body { font-family: Arial; padding: 20px; background: #f5f5f5; } 
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; } 
        h1 { color: #333; } 
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; } 
        button:hover { background: #0056b3; } 
        table { width: 100%; border-collapse: collapse; margin-top: 20px; } 
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; } 
        th { background: #007bff; color: white; } 
        .status { padding: 5px 10px; border-radius: 4px; font-size: 12px; } 
        .online { background: #28a745; color: white; } 
        .offline { background: #dc3545; color: white; } 
    </style> 
</head> 
<body> 
    <div class="container"> 
        <h1>NagrikConnect Database Viewer</h1> 
        <div> 
            <button onclick="loadUsers()">View Users</button> 
            <button onclick="loadGrievances()">View Grievances</button> 
            <button onclick="checkStatus()">Check Services</button> 
        </div> 
        <div id="content"></div> 
    </div> 
    <script> 
        async function loadUsers() { 
            try { 
                const res = await fetch('http://localhost:5000/user/allusers/contact'); 
                const users = await res.json(); 
                let html = '<h2>Users (' + users.length + ')</h2><table><tr><th>Name</th><th>Email</th><th>Phone</th><th>City</th></tr>'; 
                users.forEach(u => html += `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.phone}</td><td>${u.city}</td></tr>`); 
                html += '</table>'; 
                document.getElementById('content').innerHTML = html; 
            } catch(e) { alert('Error loading users. Make sure backend is running.'); } 
        } 
        async function loadGrievances() { 
            try { 
                const res = await fetch('http://localhost:5000/grievance/allGrievances'); 
                const grievances = await res.json(); 
                let html = '<h2>Grievances (' + grievances.length + ')</h2><table><tr><th>Code</th><th>Name</th><th>Department</th><th>Status</th><th>Date</th></tr>'; 
                grievances.forEach(g => html += `<tr><td>${g.grievanceCode}</td><td>${g.complainantName}</td><td>${g.department}</td><td>${g.currentStatus}</td><td>${new Date(g.createdAt).toLocaleDateString()}</td></tr>`); 
                html += '</table>'; 
                document.getElementById('content').innerHTML = html; 
            } catch(e) { alert('Error loading grievances. Make sure backend is running.'); } 
        } 
        async function checkStatus() { 
            let html = '<h2>Service Status</h2><table><tr><th>Service</th><th>Port</th><th>Status</th></tr>'; 
            let mongoStatus = 'offline'; 
            try { 
                const res = await fetch('http://localhost:5000/user/allusers/contact'); 
                if (res.ok) mongoStatus = 'online'; 
            } catch(e) {} 
            html += `<tr><td>MongoDB</td><td>27017</td><td><span class="status ${mongoStatus}">${mongoStatus === 'online' ? 'Online' : 'Offline'}</span></td></tr>`; 
            let backendStatus = 'offline'; 
            try { 
                const res = await fetch('http://localhost:5000'); 
                if (res.ok || res.status === 404) backendStatus = 'online'; 
            } catch(e) {} 
            html += `<tr><td>Backend</td><td>5000</td><td><span class="status ${backendStatus}">${backendStatus === 'online' ? 'Online' : 'Offline'}</span></td></tr>`; 
            let pythonStatus = 'offline'; 
            try { 
                const res = await fetch('http://localhost:8000'); 
                if (res.ok) pythonStatus = 'online'; 
            } catch(e) {} 
            html += `<tr><td>Python API</td><td>8000</td><td><span class="status ${pythonStatus}">${pythonStatus === 'online' ? 'Online' : 'Offline'}</span></td></tr>`; 
            html += '</table>'; 
            document.getElementById('content').innerHTML = html; 
        } 
    </script> 
</body> 
</html>
